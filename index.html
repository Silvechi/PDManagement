<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#2a5fd6">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="pwa-icon.svg">
  <title>PD Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="css/styles.css?v=7">
</head>
<body>
  <div class="pd-root" id="pd-root">
    <header class="topbar" id="topbar"></header>
    <div id="offline-banner" role="alert"></div>
    <main class="content" id="screen-container" role="main"></main>
    <nav class="botnav" id="bottom-nav" aria-label="Main navigation"></nav>
  </div>

  <script src="js/cache.js?v=6"></script>
  <script src="js/i18n.js?v=7"></script>

  <script src="js/auth.js?v=4"></script>
  <script src="js/drum-picker.js?v=4"></script>
  <script src="js/dashboard.js?v=5"></script>
  <script src="js/measurements.js?v=4"></script>
  <script src="js/inventory.js?v=4"></script>
  <script src="js/prep.js?v=5"></script>
  <script src="js/history.js?v=7"></script>
  <script src="js/users.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
